<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <script>
      // SPA redirect for GitHub Pages
      // Encodes the full path into a query param and redirects to the root
      var base = "/op-cardex";
      var path = window.location.pathname.replace(base, "") || "/";
      var search = window.location.search;
      var hash = window.location.hash;
      var redirect = base + "/?p=" + encodeURIComponent(path + search) + hash;
      window.location.replace(redirect);
    </script>
  </head>
  <body></body>
</html>
